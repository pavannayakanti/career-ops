# Career-Ops Portal Scanner Configuration
# Profile: Pavan Kumar Nayakanti
# Target: VP / Director / Principal — SRE, Platform Engineering, Cloud, DevOps, Reliability
# Base: Hyderabad, India | Open to: Remote-global, APAC, EMEA, relocation

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- SRE & Reliability --
    - "Site Reliability"
    - "SRE"
    - "Reliability Engineer"
    - "Reliability Engineering"
    - "Resilience"
    - "Incident Management"
    - "Incident Response"
    - "Recovery Lead"
    - "MTTR"
    # -- Platform Engineering --
    - "Platform Engineer"
    - "Platform Engineering"
    - "Staff Engineer"
    - "Principal Engineer"
    - "Infrastructure Engineer"
    - "Cloud Engineer"
    - "Cloud Architect"
    - "Cloud Platform"
    - "Infrastructure Architect"
    # -- DevOps & Automation --
    - "DevOps"
    - "DevSecOps"
    - "Automation Architect"
    - "Automation Engineer"
    - "CI/CD"
    - "Release Engineer"
    - "Build Engineer"
    # -- Observability & AIOps --
    - "Observability"
    - "AIOps"
    - "MLOps"
    - "Monitoring"
    - "Telemetry"
    # -- Leadership --
    - "Head of Engineering"
    - "Head of SRE"
    - "Head of Platform"
    - "Head of Infrastructure"
    - "Head of Cloud"
    - "VP Engineering"
    - "VP of Infrastructure"
    - "VP of Platform"
    - "Director of Engineering"
    - "Director of SRE"
    - "Director of Platform"
    - "Director of Infrastructure"
    - "Engineering Manager"
    - "Director of Cloud"
    # -- Solutions / Pre-sales / Advisory --
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Cloud Solutions"
    - "Technical Account Manager"
    - "Field CTO"
    - "Technical Advisor"
    # -- GenAI / AI Engineering (emerging focus) --
    - "GenAI"
    - "Generative AI"
    - "AI Platform"
    - "AI Infrastructure"
    - "LLMOps"

  negative:
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Entry Level"
    - "Associate"
    - "iOS"
    - "Android"
    - "Frontend"
    - "React"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "COBOL"
    - "Mainframe"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Game"
    - "QA Analyst"            # pure QA; Pavan is above this level
    - "Manual Tester"

  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "Global"

# -- Search queries --
# Tuned to SRE / Platform / Cloud leadership roles; India-remote-friendly portals.

search_queries:

  # -- Core SRE & Reliability --
  - name: Greenhouse — Head / VP SRE
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Head of SRE" OR "VP of SRE" OR "Director of SRE" OR "VP Site Reliability" remote OR India'
    enabled: true

  - name: Greenhouse — Platform Engineering Leadership
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Head of Platform Engineering" OR "VP Platform" OR "Director Platform Engineering" remote'
    enabled: true

  - name: Ashby — SRE & Platform Leadership
    query: 'site:jobs.ashbyhq.com "Site Reliability" OR "SRE" OR "Platform Engineering" "Head" OR "Director" OR "VP" OR "Principal" remote'
    enabled: true

  - name: Lever — SRE & Reliability Leadership
    query: 'site:jobs.lever.co "Site Reliability Engineer" OR "Head of SRE" OR "Platform Engineering" "Senior" OR "Staff" OR "Principal" OR "Director" remote'
